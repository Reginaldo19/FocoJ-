<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FocoJá Live - Transmissões ao Vivo</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; }
        .glass { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5) rotate(10deg); opacity: 0; }
        }
        .heart-animation { animation: floatUp 2s ease-out forwards; position: fixed; z-index: 1000; pointer-events: none; font-size: 28px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .gift-popup { animation: slideIn 0.3s ease-out forwards; }
        
        .live-card {
            transition: transform 0.2s, border-color 0.2s;
        }
        .live-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
        }
        
        /* Feed grid */
        .lives-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .preview-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        /* Máscara para fade do chat */
        .mask-fade {
            mask-image: linear-gradient(to bottom, black 70%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent);
        }
        
        /* Para o chat flutuante */
        .floating-chat-message {
            animation: slideInLeft 0.3s ease-out, fadeOut 0.5s ease-out 4.5s forwards;
        }
        
        @keyframes slideInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(-20px); display: none; }
        }
        
        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-neutral-950">

<!-- HEADER DO SISTEMA -->
<div class="sticky top-0 z-50 bg-neutral-900/95 backdrop-blur-md border-b border-neutral-800 px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </div>
        <span class="text-white font-bold text-xl">Foco<span class="text-blue-500">Já</span> LIVE</span>
    </div>
    <button id="startLiveBtn" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        Iniciar Live
    </button>
</div>

<!-- FEED DE LIVES -->
<div id="livesFeed" class="lives-feed"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACIj5d-Nf01jF4AbzPfXOLNzQpyRXy4Qo",
        authDomain: "afrimov-c6484.firebaseapp.com",
        databaseURL: "https://afrimov-c6484-default-rtdb.firebaseio.com",
        projectId: "afrimov-c6484",
        storageBucket: "afrimov-c6484.firebasestorage.app",
        messagingSenderId: "614232050013",
        appId: "1:614232050013:web:ad3fdf1dbe8187a329c0b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentUserData = null;
    let currentUserType = null;
    let currentStream = null;
    let currentLiveId = null;
    let frameInterval = null;

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    function showToast(message, isError = false) {
        const container = document.getElementById('toast-container-global');
        if (!container) {
            const div = document.createElement('div');
            div.id = 'toast-container-global';
            div.style.cssText = 'position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none;';
            document.body.appendChild(div);
        }
        const toastDiv = document.createElement('div');
        toastDiv.className = `glass text-white text-xs px-4 py-2 rounded-lg shadow-xl border-l-4 ${isError ? 'border-red-500' : 'border-blue-500'} backdrop-blur-md`;
        toastDiv.innerText = message;
        document.getElementById('toast-container-global').appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== SEGUIR ====================
    async function checkIfFollowing(empresaId) {
        const followRef = await db.ref(`seguidores/${empresaId}/${currentUser.uid}`).once('value');
        return followRef.exists();
    }

    async function followEmpresa(empresaId, empresaNome, liveId) {
        await db.ref(`seguidores/${empresaId}/${currentUser.uid}`).set({
            usuarioId: currentUser.uid,
            usuarioNome: currentUserData?.nome || currentUser.displayName,
            data: Date.now()
        });
        await db.ref(`seguindo/${currentUser.uid}/${empresaId}`).set({
            empresaId: empresaId,
            empresaNome: empresaNome,
            data: Date.now()
        });
        addFloatingMessage(liveId, `${currentUserData?.nome || currentUser.displayName} começou a seguir ${empresaNome}`, true);
        showToast(`Você agora segue ${empresaNome}`);
        return true;
    }

    async function unfollowEmpresa(empresaId, empresaNome, liveId) {
        await db.ref(`seguidores/${empresaId}/${currentUser.uid}`).remove();
        await db.ref(`seguindo/${currentUser.uid}/${empresaId}`).remove();
        addFloatingMessage(liveId, `${currentUserData?.nome || currentUser.displayName} deixou de seguir ${empresaNome}`, true);
        showToast(`Você deixou de seguir ${empresaNome}`);
        return false;
    }

    // ==================== MENSAGEM FLUTUANTE ====================
    function addFloatingMessage(liveId, text, isSystem = false) {
        const container = document.getElementById(`chatContainer-${liveId}`);
        if (!container) return;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `floating-chat-message text-white text-sm mb-2 ${isSystem ? 'opacity-70 italic' : ''}`;
        msgDiv.style.background = 'rgba(0,0,0,0.5)';
        msgDiv.style.backdropFilter = 'blur(8px)';
        msgDiv.style.padding = '8px 14px';
        msgDiv.style.borderRadius = '20px';
        msgDiv.style.width = 'fit-content';
        msgDiv.style.maxWidth = '90%';
        
        if (isSystem) {
            msgDiv.innerHTML = `<span class="text-yellow-400 mr-1">●</span> ${escapeHtml(text)}`;
        } else {
            msgDiv.innerHTML = text;
        }
        
        container.appendChild(msgDiv);
        setTimeout(() => {
            if (msgDiv.parentNode) msgDiv.remove();
        }, 5000);
        
        while (container.children.length > 15) {
            container.removeChild(container.firstChild);
        }
    }

    // ==================== INICIAR LIVE (STREAMER) ====================
    async function startLive(titulo) {
        try {
            showToast("Acessando câmera...");
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 1280 } }, 
                audio: true 
            });
            
            currentStream = stream;
            
            const liveRef = db.ref('lives').push();
            currentLiveId = liveRef.key;
            
            const liveData = {
                id: currentLiveId,
                empresaId: currentUser.uid,
                empresaNome: currentUserData?.nomeEmpresa || currentUser.displayName || 'Empresa',
                titulo: titulo,
                inicio: Date.now(),
                ativa: true,
                viewers: {},
                likes: 0,
                currentFrame: null
            };
            
            await liveRef.set(liveData);
            await db.ref(`lives/${currentLiveId}/viewers/${currentUser.uid}`).set({
                nome: currentUserData?.nomeEmpresa || currentUser.displayName,
                entrada: Date.now(),
                isStreamer: true
            });
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.playsInline = true;
            await video.play();
            
            frameInterval = setInterval(async () => {
                if (!currentLiveId || !currentStream) return;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 360;
                    canvas.height = 640;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frameData = canvas.toDataURL('image/jpeg', 0.7);
                    await db.ref(`liveFrames/${currentLiveId}`).set({ frame: frameData, timestamp: Date.now() });
                    await db.ref(`lives/${currentLiveId}`).update({ currentFrame: frameData, lastFrameTime: Date.now() });
                } catch (err) {}
            }, 200);
            
            showToast("Live iniciada!");
            openLiveUI(currentLiveId, titulo, stream, true);
            
        } catch (err) {
            console.error(err);
            showToast("Erro ao acessar câmera", true);
        }
    }
    
    async function endLive() {
        if (frameInterval) clearInterval(frameInterval);
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        if (currentLiveId) {
            await db.ref(`lives/${currentLiveId}`).update({ ativa: false, fim: Date.now() });
            await db.ref(`liveFrames/${currentLiveId}`).remove();
            showToast("Live encerrada");
            currentLiveId = null;
            loadActiveLives();
        }
    }
    
    // ==================== ASSISTIR LIVE (CLIENTE) ====================
    async function watchLive(liveId) {
        const liveSnap = await db.ref(`lives/${liveId}`).once('value');
        const live = liveSnap.val();
        if (!live || !live.ativa) {
            showToast("Live não está mais disponível", true);
            return;
        }
        await db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).set({
            nome: currentUserData?.nome || currentUserData?.nomeEmpresa || currentUser.displayName || 'Espectador',
            entrada: Date.now()
        });
        openLiveUI(liveId, live.titulo, null, false);
    }
    
    // ==================== INTERFACE DA LIVE ====================
    async function openLiveUI(liveId, titulo, stream, isStreamer) {
        const existingScreen = document.querySelector('.live-screen');
        if (existingScreen) existingScreen.remove();
        
        const liveSnap = await db.ref(`lives/${liveId}`).once('value');
        const live = liveSnap.val();
        const empresaId = live.empresaId;
        const empresaNome = live.empresaNome;
        
        let isFollowing = false;
        if (!isStreamer && currentUserType === 'cliente') {
            isFollowing = await checkIfFollowing(empresaId);
        }
        
        const screen = document.createElement('div');
        screen.className = 'live-screen fixed inset-0 z-[1000] bg-black';
        screen.id = `live-${liveId}`;
        
        screen.innerHTML = `
            <div class="relative w-full h-full bg-black flex items-center justify-center overflow-hidden">
                <!-- Video -->
                <img id="liveFrame-${liveId}" class="w-full h-full object-contain" src="">
                
                <!-- Top Header Info -->
                <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-20">
                    <div class="flex items-center gap-2 glass p-1.5 pr-4 rounded-full">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-400 to-indigo-600 border-2 border-white shadow-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                        </div>
                        <div>
                            <p class="text-white text-xs font-bold">${escapeHtml(empresaNome)}</p>
                            <p class="text-white/60 text-[10px] flex items-center gap-1">
                                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                                <span id="viewerCount-${liveId}">0</span> espectadores
                            </p>
                        </div>
                        ${!isStreamer && currentUserType === 'cliente' ? `
                            <button id="followBtn-${liveId}" class="bg-blue-500 hover:bg-blue-600 transition-colors text-white text-[10px] font-bold px-3 py-1 rounded-full ml-3">${isFollowing ? 'Seguindo' : 'Seguir'}</button>
                        ` : ''}
                    </div>
                    <button id="closeLiveBtn" class="glass p-2 rounded-full text-white">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>

                <!-- Sidebar Actions -->
                <div class="absolute right-3 bottom-32 flex flex-col gap-6 z-20">
                    <button id="likeBtn-${liveId}" class="flex flex-col items-center group">
                        <div class="p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md transition-all">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                        <span class="text-white text-[10px] mt-1 font-semibold" id="likesCount-${liveId}">0</span>
                    </button>
                    <button id="commentBtn-${liveId}" class="flex flex-col items-center">
                        <div class="p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md transition-all">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </div>
                        <span class="text-white text-[10px] mt-1 font-semibold" id="commentsCount-${liveId}">0</span>
                    </button>
                    <button id="shareBtn-${liveId}" class="flex flex-col items-center">
                        <div class="p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md transition-all">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.05 4.11c-.05.23-.09.46-.09.7 0 1.66 1.34 3 3 3s3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </div>
                    </button>
                    ${isStreamer ? `
                        <button id="switchCamBtn-${liveId}" class="flex flex-col items-center">
                            <div class="p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md transition-all">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 14c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                            </div>
                            <span class="text-white text-[10px] mt-1">Flip</span>
                        </button>
                        <button id="endLiveBtn-${liveId}" class="flex flex-col items-center">
                            <div class="p-3 rounded-full bg-red-500/80 hover:bg-red-600 backdrop-blur-md transition-all">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            </div>
                            <span class="text-white text-[10px] mt-1">Encerrar</span>
                        </button>
                    ` : ''}
                </div>

                <!-- Floating Chat Messages -->
                <div id="chatContainer-${liveId}" class="absolute bottom-28 left-4 right-20 max-w-[280px] flex flex-col gap-1 pointer-events-none z-15"></div>

                <!-- Footer Chat Input -->
                <div class="absolute bottom-4 left-4 right-4 z-20">
                    <div class="flex gap-2">
                        <input type="text" id="chatInput-${liveId}" placeholder="Comente algo..." 
                            class="flex-1 bg-black/40 border border-white/10 rounded-full py-2.5 px-4 text-white placeholder-white/40 focus:outline-none focus:border-white/30 text-sm">
                        <button id="sendChatBtn-${liveId}" class="glass p-2.5 rounded-full text-white">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        document.body.appendChild(screen);
        
        const frameImg = document.getElementById(`liveFrame-${liveId}`);
        let lastFrameTime = 0;
        
        db.ref(`liveFrames/${liveId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.frame && data.timestamp > lastFrameTime) {
                frameImg.src = data.frame;
                lastFrameTime = data.timestamp;
            }
        });
        
        // Contadores em tempo real
        db.ref(`lives/${liveId}/viewers`).on('value', (snap) => {
            const count = snap.numChildren();
            const viewerSpan = document.getElementById(`viewerCount-${liveId}`);
            if (viewerSpan) viewerSpan.innerText = formatNumber(count);
        });
        
        db.ref(`lives/${liveId}/likes`).on('value', (snap) => {
            const likes = snap.val() || 0;
            const likesSpan = document.getElementById(`likesCount-${liveId}`);
            if (likesSpan) likesSpan.innerText = formatNumber(likes);
        });
        
        db.ref(`lives/${liveId}/chat`).on('value', (snap) => {
            const count = snap.numChildren();
            const commentsSpan = document.getElementById(`commentsCount-${liveId}`);
            if (commentsSpan) commentsSpan.innerText = formatNumber(count);
        });
        
        // Chat em tempo real - mensagens flutuantes
        db.ref(`lives/${liveId}/chat`).on('child_added', (snapshot) => {
            const msg = snapshot.val();
            if (!msg) return;
            if (Date.now() - msg.timestamp > 10000) return;
            
            let displayText = '';
            if (msg.isSystem) {
                displayText = `<span class="text-yellow-400 mr-1">●</span> ${escapeHtml(msg.texto)}`;
                addFloatingMessage(liveId, msg.texto, true);
            } else {
                displayText = `<span class="font-bold text-blue-400 mr-2">${escapeHtml(msg.nome)}:</span> ${escapeHtml(msg.texto)}`;
                const msgContainer = document.getElementById(`chatContainer-${liveId}`);
                if (msgContainer) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'floating-chat-message text-white text-sm mb-2';
                    msgDiv.style.background = 'rgba(0,0,0,0.5)';
                    msgDiv.style.backdropFilter = 'blur(8px)';
                    msgDiv.style.padding = '8px 14px';
                    msgDiv.style.borderRadius = '20px';
                    msgDiv.style.width = 'fit-content';
                    msgDiv.style.maxWidth = '90%';
                    msgDiv.innerHTML = displayText;
                    msgContainer.appendChild(msgDiv);
                    
                    setTimeout(() => {
                        if (msgDiv.parentNode) msgDiv.remove();
                    }, 5000);
                    
                    while (msgContainer.children.length > 15) {
                        msgContainer.removeChild(msgContainer.firstChild);
                    }
                }
            }
        });
        
        // Like
        const likeBtn = document.getElementById(`likeBtn-${liveId}`);
        const likesRef = db.ref(`lives/${liveId}/likes`);
        
        likeBtn?.addEventListener('click', () => {
            likesRef.transaction((current) => (current || 0) + 1);
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart-animation';
            heart.style.left = Math.random() * 80 + 10 + '%';
            heart.style.bottom = '120px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        });
        
        frameImg?.addEventListener('dblclick', () => likeBtn?.click());
        
        // Chat
        const sendBtn = document.getElementById(`sendChatBtn-${liveId}`);
        const chatInput = document.getElementById(`chatInput-${liveId}`);
        
        sendBtn?.addEventListener('click', async () => {
            const msg = chatInput.value.trim();
            if (!msg) return;
            await db.ref(`lives/${liveId}/chat`).push({
                userId: currentUser.uid,
                nome: currentUserData?.nome || currentUserData?.nomeEmpresa || currentUser.displayName || 'Usuário',
                texto: msg,
                timestamp: Date.now()
            });
            chatInput.value = '';
        });
        
        chatInput?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn?.click();
        });
        
        document.getElementById(`commentBtn-${liveId}`)?.addEventListener('click', () => {
            chatInput?.focus();
        });
        
        document.getElementById(`shareBtn-${liveId}`)?.addEventListener('click', async () => {
            await navigator.clipboard.writeText(window.location.href);
            showToast("Link copiado!");
        });
        
        // Seguir
        const followBtn = document.getElementById(`followBtn-${liveId}`);
        if (followBtn && !isStreamer && currentUserType === 'cliente') {
            let currentFollowStatus = isFollowing;
            followBtn.onclick = async () => {
                if (currentFollowStatus) {
                    await unfollowEmpresa(empresaId, empresaNome, liveId);
                    currentFollowStatus = false;
                    followBtn.textContent = 'Seguir';
                    followBtn.classList.remove('bg-neutral-800');
                    followBtn.classList.add('bg-blue-500');
                } else {
                    await followEmpresa(empresaId, empresaNome, liveId);
                    currentFollowStatus = true;
                    followBtn.textContent = 'Seguindo';
                    followBtn.classList.remove('bg-blue-500');
                    followBtn.classList.add('bg-neutral-800');
                }
            };
        }
        
        // Fechar
        document.getElementById('closeLiveBtn')?.addEventListener('click', async () => {
            if (!isStreamer) {
                await db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).remove();
            }
            screen.remove();
            if (isStreamer) {
                await endLive();
                loadActiveLives();
            }
        });
        
        // Streamer controls
        if (isStreamer && stream) {
            let currentFacing = 'user';
            let currentVideoObj = null;
            
            const localVideo = document.createElement('video');
            localVideo.srcObject = stream;
            localVideo.muted = true;
            localVideo.playsInline = true;
            await localVideo.play();
            currentVideoObj = localVideo;
            
            document.getElementById(`switchCamBtn-${liveId}`)?.addEventListener('click', async () => {
                currentFacing = currentFacing === 'user' ? 'environment' : 'user';
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: currentFacing } },
                        audio: true
                    });
                    const oldTracks = currentStream.getTracks();
                    oldTracks.forEach(t => t.stop());
                    currentStream = newStream;
                    currentVideoObj.srcObject = newStream;
                    await currentVideoObj.play();
                    
                    if (frameInterval) clearInterval(frameInterval);
                    frameInterval = setInterval(async () => {
                        if (!currentLiveId || !currentStream) return;
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = 360;
                            canvas.height = 640;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(currentVideoObj, 0, 0, canvas.width, canvas.height);
                            const frameData = canvas.toDataURL('image/jpeg', 0.7);
                            await db.ref(`liveFrames/${currentLiveId}`).set({ frame: frameData, timestamp: Date.now() });
                            await db.ref(`lives/${currentLiveId}`).update({ currentFrame: frameData, lastFrameTime: Date.now() });
                        } catch (err) {}
                    }, 200);
                    showToast("Câmera trocada");
                } catch (err) {
                    showToast("Erro ao trocar câmera", true);
                }
            });
            
            document.getElementById(`endLiveBtn-${liveId}`)?.addEventListener('click', async () => {
                if (confirm('Encerrar live?')) {
                    await endLive();
                    screen.remove();
                    loadActiveLives();
                }
            });
        }
    }
    
    // ==================== FEED ====================
    function loadActiveLives() {
        db.ref('lives').orderByChild('ativa').equalTo(true).on('value', (snapshot) => {
            const lives = [];
            snapshot.forEach(child => {
                lives.push({ id: child.key, ...child.val() });
            });
            renderLivesFeed(lives);
        });
    }
    
    function renderLivesFeed(lives) {
        const container = document.getElementById('livesFeed');
        if (!container) return;
        
        if (lives.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <svg class="w-20 h-20 mx-auto text-neutral-700 mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                    <h3 class="text-white font-semibold mb-2">Nenhuma live no momento</h3>
                    <p class="text-neutral-500 text-sm">Volte mais tarde ou inicie uma transmissão</p>
                    ${currentUserType === 'empresa' ? '<button id="emptyStartLive" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-semibold">Iniciar Live</button>' : ''}
                </div>
            `;
            if (currentUserType === 'empresa') {
                document.getElementById('emptyStartLive')?.addEventListener('click', showCreateLiveModal);
            }
            return;
        }
        
        container.innerHTML = lives.map(live => {
            const viewers = live.viewers ? Object.keys(live.viewers).length : 0;
            const previewFrame = live.currentFrame || null;
            return `
                <div class="live-card bg-neutral-900 rounded-xl overflow-hidden cursor-pointer border border-neutral-800" data-id="${live.id}">
                    <div class="relative h-48 bg-neutral-800">
                        ${previewFrame ? 
                            `<img src="${previewFrame}" class="w-full h-full object-cover" alt="Preview">` : 
                            '<div class="w-full h-full flex items-center justify-center"><svg class="w-12 h-12 text-neutral-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>'
                        }
                        <div class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span>
                            AO VIVO
                        </div>
                        <div class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded-full flex items-center gap-1">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            ${formatNumber(viewers)}
                        </div>
                    </div>
                    <div class="p-3">
                        <h4 class="text-white font-semibold text-sm">${escapeHtml(live.titulo)}</h4>
                        <p class="text-blue-400 text-xs mt-1 flex items-center gap-1">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                            ${escapeHtml(live.empresaNome)}
                        </p>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.live-card').forEach(card => {
            const liveId = card.dataset.id;
            card.addEventListener('click', () => watchLive(liveId));
        });
    }
    
    // ==================== MODAL ====================
    function showCreateLiveModal() {
        if (currentUserType !== 'empresa') {
            showToast('Apenas empresas podem iniciar lives', true);
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] flex items-center justify-center';
        modal.innerHTML = `
            <div class="bg-neutral-900 rounded-2xl p-6 w-[90%] max-w-md border border-neutral-800">
                <h3 class="text-white text-xl font-bold mb-4">Iniciar Live</h3>
                <div class="bg-neutral-800 rounded-xl overflow-hidden mb-4 aspect-video">
                    <video id="previewCam" autoplay muted playsinline class="w-full h-full object-cover"></video>
                </div>
                <input type="text" id="liveTitle" placeholder="Título da live" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white placeholder-neutral-500 mb-4 focus:outline-none focus:border-blue-500">
                <div class="flex gap-3">
                    <button id="cancelModal" class="flex-1 bg-neutral-800 hover:bg-neutral-700 text-white py-2 rounded-xl font-semibold">Cancelar</button>
                    <button id="confirmModal" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl font-semibold">Iniciar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        let previewStream = null;
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
            .then(stream => {
                previewStream = stream;
                const video = document.getElementById('previewCam');
                if (video) video.srcObject = stream;
            })
            .catch(err => {
                console.error(err);
                showToast('Erro ao acessar câmera', true);
            });
        
        document.getElementById('cancelModal').onclick = () => {
            if (previewStream) previewStream.getTracks().forEach(t => t.stop());
            modal.remove();
        };
        
        document.getElementById('confirmModal').onclick = async () => {
            const titulo = document.getElementById('liveTitle').value.trim();
            if (!titulo) {
                showToast('Digite o título', true);
                return;
            }
            if (previewStream) previewStream.getTracks().forEach(t => t.stop());
            modal.remove();
            await startLive(titulo);
        };
    }
    
    // ==================== INICIALIZAÇÃO ====================
    document.getElementById('startLiveBtn')?.addEventListener('click', showCreateLiveModal);
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        currentUser = user;
        
        const empresa = await db.ref(`empresas/${user.uid}`).once('value');
        if (empresa.exists()) {
            currentUserType = 'empresa';
            currentUserData = empresa.val();
        } else {
            const cliente = await db.ref(`clientes/${user.uid}`).once('value');
            currentUserType = 'cliente';
            currentUserData = cliente.val() || { nome: user.displayName || 'Cliente' };
        }
        
        const startBtn = document.getElementById('startLiveBtn');
        if (startBtn) {
            startBtn.style.display = currentUserType === 'empresa' ? 'flex' : 'none';
        }
        
        loadActiveLives();
    });
</script>
</body>
