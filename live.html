<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FocoJá Live - Transmissões ao Vivo</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            color: #1E293B;
            overflow-x: hidden;
        }

        .header {
            position: sticky;
            top: 0;
            background: #FFFFFF;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #D4AF37;
            z-index: 100;
        }

        .logo h2 {
            font-weight: 800;
            font-size: 22px;
            color: #0A2647;
        }

        .logo span {
            color: #D4AF37;
        }

        .btn-start {
            background: linear-gradient(135deg, #D4AF37, #F5D471);
            color: #0A2647;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            padding: 24px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .live-card {
            background: #FFFFFF;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #E2E8F0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .live-card:hover {
            transform: translateY(-4px);
            border-color: #D4AF37;
        }

        .preview {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, #0A2647, #1B3A5C);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #EF4444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .viewer-badge {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
        }

        .card-info {
            padding: 14px;
        }

        .card-info h4 {
            font-size: 15px;
            font-weight: 700;
            color: #0A2647;
            margin-bottom: 4px;
        }

        .card-info p {
            font-size: 12px;
            color: #D4AF37;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #FFFFFF;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
        }

        .modal-content h3 {
            color: #0A2647;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: #F8FAFC;
            border: 1.5px solid #E2E8F0;
            border-radius: 16px;
            font-family: inherit;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .camera-preview {
            background: #0A2647;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
        }

        .camera-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-cancel {
            background: #F1F5F9;
            color: #64748B;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #D4AF37, #F5D471);
            color: #0A2647;
        }

        .empty-feed {
            text-align: center;
            padding: 60px 20px;
            background: #FFFFFF;
            border-radius: 24px;
            margin: 24px;
            border: 1px solid #E2E8F0;
        }

        /* LIVE SCREEN */
        .live-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 50px 16px 20px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .live-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 16px 6px 8px;
            border-radius: 50px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #D4AF37, #F5D471);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .streamer-details {
            display: flex;
            flex-direction: column;
        }

        .streamer-name {
            color: white;
            font-weight: 700;
            font-size: 13px;
        }

        .viewer-count {
            color: rgba(255,255,255,0.7);
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .follow-btn {
            background: #D4AF37;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: #0A2647;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
        }

        .follow-btn.following {
            background: #334155;
            color: white;
        }

        .close-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .side-buttons {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

        .side-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            width: 48px;
            padding: 10px 0;
            border-radius: 30px;
            cursor: pointer;
        }

        .side-btn svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .side-btn span {
            color: white;
            font-size: 10px;
            font-weight: 600;
        }

        .like-btn.liked svg {
            color: #EF4444;
            transform: scale(1.2);
        }

        .chat-area {
            position: absolute;
            bottom: 80px;
            left: 12px;
            right: 80px;
            max-width: 320px;
            z-index: 20;
            pointer-events: none;
        }

        .chat-messages {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            height: 280px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }

        .chat-msg {
            font-size: 12px;
            color: white;
            word-break: break-word;
        }

        .chat-msg .name {
            font-weight: 700;
            color: #D4AF37;
            margin-right: 8px;
        }

        .chat-msg.system {
            color: #D4AF37;
            font-style: italic;
            text-align: center;
        }

        .chat-input-area {
            position: absolute;
            bottom: 16px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            display: flex;
            gap: 8px;
            padding: 6px 6px 6px 20px;
            z-index: 20;
            pointer-events: auto;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .chat-input-area button {
            background: #D4AF37;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 700;
            cursor: pointer;
            color: #0A2647;
        }

        .floating-heart {
            position: fixed;
            font-size: 40px;
            pointer-events: none;
            z-index: 1001;
            animation: floatHeart 1.5s ease-out forwards;
        }

        @keyframes floatHeart {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(1.2) translateY(-150px); opacity: 0; }
        }

        @media (max-width: 768px) {
            .feed {
                padding: 16px;
                gap: 16px;
            }
            .chat-area {
                right: 70px;
                max-width: none;
            }
            .chat-messages {
                height: 240px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <h2>Foco<span>Já</span> LIVE</h2>
    </div>
    <button id="startLiveBtn" class="btn-start">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        Iniciar Live
    </button>
</div>

<div id="feed" class="feed"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACIj5d-Nf01jF4AbzPfXOLNzQpyRXy4Qo",
        authDomain: "afrimov-c6484.firebaseapp.com",
        databaseURL: "https://afrimov-c6484-default-rtdb.firebaseio.com",
        projectId: "afrimov-c6484",
        storageBucket: "afrimov-c6484.firebasestorage.app",
        messagingSenderId: "614232050013",
        appId: "1:614232050013:web:ad3fdf1dbe8187a329c0b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentUserData = null;
    let currentUserType = null;
    let currentStream = null;
    let currentLiveId = null;
    let frameInterval = null;
    let isStreamerActive = false;

    // Chave para salvar live ativa do streamer
    const STREAMER_LIVE_KEY = 'focojá_streamer_live';

    function saveStreamerLive(liveId) {
        if (liveId) {
            localStorage.setItem(STREAMER_LIVE_KEY, liveId);
        } else {
            localStorage.removeItem(STREAMER_LIVE_KEY);
        }
    }

    function getSavedStreamerLive() {
        return localStorage.getItem(STREAMER_LIVE_KEY);
    }

    function getLiveIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('live');
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: ${isError ? '#EF4444' : '#10B981'};
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            white-space: nowrap;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateURLLiveId(liveId) {
        const url = new URL(window.location.href);
        if (liveId) {
            url.searchParams.set('live', liveId);
        } else {
            url.searchParams.delete('live');
        }
        window.history.replaceState({}, '', url);
    }

    // ==================== SEGUIR ====================
    async function checkIfFollowing(empresaId) {
        const followRef = await db.ref(`seguidores/${empresaId}/${currentUser.uid}`).once('value');
        return followRef.exists();
    }

    async function followEmpresa(empresaId, empresaNome, liveId) {
        await db.ref(`seguidores/${empresaId}/${currentUser.uid}`).set({
            usuarioId: currentUser.uid,
            usuarioNome: currentUserData?.nome || currentUser.displayName,
            data: Date.now()
        });
        await db.ref(`seguindo/${currentUser.uid}/${empresaId}`).set({
            empresaId: empresaId,
            empresaNome: empresaNome,
            data: Date.now()
        });
        await db.ref(`lives/${liveId}/chat`).push({
            userId: 'system',
            nome: 'SISTEMA',
            texto: `${currentUserData?.nome || currentUser.displayName} começou a seguir ${empresaNome}`,
            timestamp: Date.now(),
            isSystem: true
        });
        showToast(`Você agora segue ${empresaNome}`);
        return true;
    }

    async function unfollowEmpresa(empresaId, empresaNome, liveId) {
        await db.ref(`seguidores/${empresaId}/${currentUser.uid}`).remove();
        await db.ref(`seguindo/${currentUser.uid}/${empresaId}`).remove();
        await db.ref(`lives/${liveId}/chat`).push({
            userId: 'system',
            nome: 'SISTEMA',
            texto: `${currentUserData?.nome || currentUser.displayName} deixou de seguir ${empresaNome}`,
            timestamp: Date.now(),
            isSystem: true
        });
        showToast(`Você deixou de seguir ${empresaNome}`);
        return false;
    }

    // ==================== LIVE STREAMER ====================
    async function startLive(titulo) {
        try {
            showToast("Acessando câmera...");
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: true,
                audio: true 
            });
            
            currentStream = stream;
            
            const liveRef = db.ref('lives').push();
            currentLiveId = liveRef.key;
            
            const liveData = {
                id: currentLiveId,
                empresaId: currentUser.uid,
                empresaNome: currentUserData?.nomeEmpresa || currentUser.displayName || 'Empresa',
                titulo: titulo,
                inicio: Date.now(),
                ativa: true,
                viewers: {},
                likes: 0,
                currentFrame: null,
                streamerId: currentUser.uid
            };
            
            await liveRef.set(liveData);
            
            // Salvar que este usuário é streamer desta live
            saveStreamerLive(currentLiveId);
            isStreamerActive = true;
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.playsInline = true;
            await video.play();
            
            // Capturar frames para os espectadores
            frameInterval = setInterval(async () => {
                if (!currentLiveId || !currentStream) return;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 480;
                    canvas.height = 854;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frameData = canvas.toDataURL('image/jpeg', 0.6);
                    await db.ref(`liveFrames/${currentLiveId}`).set({ frame: frameData, timestamp: Date.now() });
                    await db.ref(`lives/${currentLiveId}`).update({ currentFrame: frameData, lastFrameTime: Date.now() });
                } catch (err) {}
            }, 300);
            
            updateURLLiveId(currentLiveId);
            showToast("Live iniciada!");
            openLiveUI(currentLiveId, titulo, stream, true);
            
        } catch (err) {
            console.error(err);
            showToast("Erro ao acessar câmera", true);
        }
    }
    
    async function endLive() {
        if (frameInterval) clearInterval(frameInterval);
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        if (currentLiveId) {
            await db.ref(`lives/${currentLiveId}`).update({ ativa: false, fim: Date.now() });
            await db.ref(`liveFrames/${currentLiveId}`).remove();
            showToast("Live encerrada");
            currentLiveId = null;
            isStreamerActive = false;
            saveStreamerLive(null);
            updateURLLiveId(null);
            loadActiveLives();
        }
    }
    
    // ==================== ASSISTIR LIVE ====================
    async function watchLive(liveId) {
        const liveSnap = await db.ref(`lives/${liveId}`).once('value');
        const live = liveSnap.val();
        
        if (!live || !live.ativa) {
            showToast("Live não está mais disponível", true);
            updateURLLiveId(null);
            return;
        }
        
        // Só adicionar viewer se não for o streamer
        if (currentUser.uid !== live.empresaId) {
            await db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).set({
                nome: currentUserData?.nome || currentUserData?.nomeEmpresa || currentUser.displayName || 'Espectador',
                entrada: Date.now()
            });
        }
        
        updateURLLiveId(liveId);
        openLiveUI(liveId, live.titulo, null, false);
    }
    
    // ==================== INTERFACE DA LIVE ====================
    async function openLiveUI(liveId, titulo, stream, isStreamer) {
        const existingScreen = document.querySelector('.live-screen');
        if (existingScreen) existingScreen.remove();
        
        const liveSnap = await db.ref(`lives/${liveId}`).once('value');
        const live = liveSnap.val();
        
        if (!live || !live.ativa) {
            if (!isStreamer) {
                showToast("Live encerrada", true);
                updateURLLiveId(null);
            }
            return;
        }
        
        const empresaId = live.empresaId;
        const empresaNome = live.empresaNome;
        
        let isFollowing = false;
        if (!isStreamer && currentUserType === 'cliente') {
            isFollowing = await checkIfFollowing(empresaId);
        }
        
        const viewersCount = live.viewers ? Object.keys(live.viewers).length : 0;
        
        const screen = document.createElement('div');
        screen.className = 'live-screen';
        screen.id = `live-${liveId}`;
        
        screen.innerHTML = `
            <div class="video-container">
                <img id="liveFrame" src="">
                
                <div class="top-bar">
                    <div class="live-info">
                        <div class="avatar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                        </div>
                        <div class="streamer-details">
                            <span class="streamer-name">${escapeHtml(empresaNome)}</span>
                            <span class="viewer-count">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                                <span id="viewerCount">${formatNumber(viewersCount)}</span>
                            </span>
                        </div>
                        ${!isStreamer && currentUserType === 'cliente' ? `
                            <button id="followBtn" class="follow-btn ${isFollowing ? 'following' : ''}">${isFollowing ? 'Seguindo' : 'Seguir'}</button>
                        ` : ''}
                    </div>
                    <button id="closeBtn" class="close-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
                
                <div class="side-buttons">
                    <button id="likeBtn" class="side-btn like-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span id="likesCount">${formatNumber(live.likes || 0)}</span>
                    </button>
                    <button id="commentBtn" class="side-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span id="commentsCount">0</span>
                    </button>
                    <button id="shareBtn" class="side-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.05 4.11c-.05.23-.09.46-.09.7 0 1.66 1.34 3 3 3s3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                    ${isStreamer ? `
                        <button id="switchCamBtn" class="side-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 14c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                            <span>Flip</span>
                        </button>
                        <button id="endLiveBtn" class="side-btn" style="background:#EF4444;">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            <span>Encerrar</span>
                        </button>
                    ` : ''}
                </div>
                
                <div class="chat-area">
                    <div id="chatMessages" class="chat-messages"></div>
                </div>
                
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Comente algo...">
                    <button id="sendBtn">Enviar</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(screen);
        
        const frameImg = document.getElementById('liveFrame');
        let lastFrameTime = 0;
        
        // Carregar frames da live
        db.ref(`liveFrames/${liveId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.frame && data.timestamp > lastFrameTime) {
                frameImg.src = data.frame;
                lastFrameTime = data.timestamp;
            }
        });
        
        // Contadores
        const viewersRef = db.ref(`lives/${liveId}/viewers`);
        const likesRef = db.ref(`lives/${liveId}/likes`);
        
        viewersRef.on('value', (snap) => {
            const count = snap.numChildren();
            const viewerSpan = document.getElementById('viewerCount');
            if (viewerSpan) viewerSpan.innerText = formatNumber(count);
        });
        
        likesRef.on('value', (snap) => {
            const likes = snap.val() || 0;
            const likesSpan = document.getElementById('likesCount');
            if (likesSpan) likesSpan.innerText = formatNumber(likes);
        });
        
        // CHAT - MOSTRANDO TODOS OS COMENTÁRIOS
        const chatRef = db.ref(`lives/${liveId}/chat`);
        
        chatRef.on('value', (snap) => {
            const msgs = [];
            snap.forEach(child => msgs.push({ id: child.key, ...child.val() }));
            msgs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
            
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            container.innerHTML = msgs.map(msg => {
                if (msg.isSystem) {
                    return `<div class="chat-msg system">● ${escapeHtml(msg.texto)}</div>`;
                }
                return `<div class="chat-msg"><span class="name">${escapeHtml(msg.nome)}</span>${escapeHtml(msg.texto)}</div>`;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        });
        
        // Contar comentários
        chatRef.on('value', (snap) => {
            const count = snap.numChildren();
            const commentsSpan = document.getElementById('commentsCount');
            if (commentsSpan) commentsSpan.innerText = formatNumber(count);
        });
        
        // Like
        const likeBtn = document.getElementById('likeBtn');
        likeBtn?.addEventListener('click', () => {
            likesRef.transaction((current) => (current || 0) + 1);
            
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 80 + 10 + '%';
            heart.style.bottom = '120px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
            
            likeBtn.classList.add('liked');
            setTimeout(() => likeBtn.classList.remove('liked'), 300);
        });
        
        frameImg?.addEventListener('dblclick', () => likeBtn?.click());
        
        // Enviar mensagem
        const sendBtn = document.getElementById('sendBtn');
        const chatInput = document.getElementById('chatInput');
        
        sendBtn?.addEventListener('click', async () => {
            const msg = chatInput.value.trim();
            if (!msg) return;
            await chatRef.push({
                userId: currentUser.uid,
                nome: currentUserData?.nome || currentUserData?.nomeEmpresa || currentUser.displayName || 'Usuário',
                texto: msg,
                timestamp: Date.now()
            });
            chatInput.value = '';
        });
        
        chatInput?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn?.click();
        });
        
        document.getElementById('commentBtn')?.addEventListener('click', () => {
            chatInput?.focus();
        });
        
        document.getElementById('shareBtn')?.addEventListener('click', async () => {
            const link = `${window.location.origin}${window.location.pathname}?live=${liveId}`;
            await navigator.clipboard.writeText(link);
            showToast("Link da live copiado!");
        });
        
        // Fechar
        document.getElementById('closeBtn')?.addEventListener('click', async () => {
            if (!isStreamer && currentUser.uid !== empresaId) {
                await db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).remove();
            }
            screen.remove();
            if (!isStreamer) {
                updateURLLiveId(null);
            }
        });
        
        // Seguir
        const followBtn = document.getElementById('followBtn');
        if (followBtn && !isStreamer && currentUserType === 'cliente') {
            let currentFollowStatus = isFollowing;
            followBtn.onclick = async () => {
                if (currentFollowStatus) {
                    await unfollowEmpresa(empresaId, empresaNome, liveId);
                    currentFollowStatus = false;
                    followBtn.textContent = 'Seguir';
                    followBtn.classList.remove('following');
                } else {
                    await followEmpresa(empresaId, empresaNome, liveId);
                    currentFollowStatus = true;
                    followBtn.textContent = 'Seguindo';
                    followBtn.classList.add('following');
                }
            };
        }
        
        // Streamer controls - TROCAR CÂMERA FUNCIONANDO
        if (isStreamer && stream) {
            let currentFacing = 'user';
            let currentVideoObj = null;
            
            const localVideo = document.createElement('video');
            localVideo.srcObject = stream;
            localVideo.muted = true;
            localVideo.playsInline = true;
            await localVideo.play();
            currentVideoObj = localVideo;
            
            const switchCamBtn = document.getElementById('switchCamBtn');
            if (switchCamBtn) {
                switchCamBtn.addEventListener('click', async () => {
                    currentFacing = currentFacing === 'user' ? 'environment' : 'user';
                    try {
                        showToast("Trocando câmera...");
                        const newStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: { exact: currentFacing } },
                            audio: true
                        });
                        
                        // Trocar tracks
                        const oldTracks = currentStream.getTracks();
                        oldTracks.forEach(t => t.stop());
                        
                        currentStream = newStream;
                        currentVideoObj.srcObject = newStream;
                        await currentVideoObj.play();
                        
                        // Reiniciar captura de frames
                        if (frameInterval) clearInterval(frameInterval);
                        frameInterval = setInterval(async () => {
                            if (!currentLiveId || !currentStream) return;
                            try {
                                const canvas = document.createElement('canvas');
                                canvas.width = 480;
                                canvas.height = 854;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(currentVideoObj, 0, 0, canvas.width, canvas.height);
                                const frameData = canvas.toDataURL('image/jpeg', 0.6);
                                await db.ref(`liveFrames/${currentLiveId}`).set({ frame: frameData, timestamp: Date.now() });
                                await db.ref(`lives/${currentLiveId}`).update({ currentFrame: frameData, lastFrameTime: Date.now() });
                            } catch (err) {}
                        }, 300);
                        
                        showToast("Câmera trocada");
                    } catch (err) {
                        console.error(err);
                        showToast("Não foi possível trocar a câmera", true);
                    }
                });
            }
            
            const endLiveBtn = document.getElementById('endLiveBtn');
            if (endLiveBtn) {
                endLiveBtn.addEventListener('click', async () => {
                    if (confirm('Encerrar live?')) {
                        await endLive();
                        screen.remove();
                        loadActiveLives();
                    }
                });
            }
        }
    }
    
    // ==================== FEED ====================
    function loadActiveLives() {
        db.ref('lives').orderByChild('ativa').equalTo(true).on('value', async (snapshot) => {
            const lives = [];
            snapshot.forEach(child => {
                lives.push({ id: child.key, ...child.val() });
            });
            renderFeed(lives);
            
            // Verificar se o usuário atual é streamer de alguma live ativa
            const savedLiveId = getSavedStreamerLive();
            if (savedLiveId && !isStreamerActive && !document.querySelector('.live-screen')) {
                const liveSnap = await db.ref(`lives/${savedLiveId}`).once('value');
                const live = liveSnap.val();
                if (live && live.ativa && live.empresaId === currentUser?.uid) {
                    // Reconectar à live como streamer
                    showToast("Reconectando à sua live...");
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        currentStream = stream;
                        currentLiveId = savedLiveId;
                        isStreamerActive = true;
                        
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.muted = true;
                        video.playsInline = true;
                        await video.play();
                        
                        frameInterval = setInterval(async () => {
                            if (!currentLiveId || !currentStream) return;
                            try {
                                const canvas = document.createElement('canvas');
                                canvas.width = 480;
                                canvas.height = 854;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                                const frameData = canvas.toDataURL('image/jpeg', 0.6);
                                await db.ref(`liveFrames/${currentLiveId}`).set({ frame: frameData, timestamp: Date.now() });
                                await db.ref(`lives/${currentLiveId}`).update({ currentFrame: frameData, lastFrameTime: Date.now() });
                            } catch (err) {}
                        }, 300);
                        
                        openLiveUI(savedLiveId, live.titulo, stream, true);
                        updateURLLiveId(savedLiveId);
                    } catch (err) {
                        console.error("Erro ao reconectar:", err);
                        saveStreamerLive(null);
                    }
                } else {
                    saveStreamerLive(null);
                }
            }
            
            // Verificar link direto
            const liveIdFromURL = getLiveIdFromURL();
            if (liveIdFromURL && !document.querySelector('.live-screen') && !isStreamerActive) {
                setTimeout(async () => {
                    const liveSnap = await db.ref(`lives/${liveIdFromURL}`).once('value');
                    const live = liveSnap.val();
                    if (live && live.ativa) {
                        watchLive(liveIdFromURL);
                    } else if (liveIdFromURL) {
                        showToast("Live não encontrada", true);
                        updateURLLiveId(null);
                    }
                }, 500);
            }
        });
    }
    
    function renderFeed(lives) {
        const container = document.getElementById('feed');
        if (!container) return;
        
        if (lives.length === 0) {
            container.innerHTML = `
                <div class="empty-feed">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="#D4AF37"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                    <h3 style="margin-top: 16px;">Nenhuma live no momento</h3>
                    <p style="color: #64748B;">Volte mais tarde ou inicie uma transmissão!</p>
                    ${currentUserType === 'empresa' ? '<button id="emptyStartBtn" style="margin-top: 20px; background: #D4AF37; border: none; padding: 12px 28px; border-radius: 30px; font-weight: 700; cursor: pointer; color:#0A2647;">Iniciar Live</button>' : ''}
                </div>
            `;
            if (currentUserType === 'empresa') {
                document.getElementById('emptyStartBtn')?.addEventListener('click', showCreateLiveModal);
            }
            return;
        }
        
        container.innerHTML = lives.map(live => {
            const viewers = live.viewers ? Object.keys(live.viewers).length : 0;
            const preview = live.currentFrame || null;
            return `
                <div class="live-card" data-id="${live.id}">
                    <div class="preview">
                        ${preview ? 
                            `<img src="${preview}" alt="Preview">` : 
                            '<svg width="48" height="48" viewBox="0 0 24 24" fill="#D4AF37"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>'
                        }
                        <div class="live-badge">
                            <span class="live-dot"></span> AO VIVO
                        </div>
                        <div class="viewer-badge">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                            ${formatNumber(viewers)}
                        </div>
                    </div>
                    <div class="card-info">
                        <h4>${escapeHtml(live.titulo)}</h4>
                        <p>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                            ${escapeHtml(live.empresaNome)}
                        </p>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.live-card').forEach(card => {
            const liveId = card.dataset.id;
            card.addEventListener('click', () => watchLive(liveId));
        });
    }
    
    // ==================== MODAL ====================
    function showCreateLiveModal() {
        if (currentUserType !== 'empresa') {
            showToast('Apenas empresas podem iniciar lives', true);
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Iniciar Live</h3>
                <div class="camera-preview">
                    <video id="previewCam" autoplay muted playsinline></video>
                </div>
                <input type="text" id="liveTitle" placeholder="Título da live">
                <div class="modal-buttons">
                    <button class="btn-cancel" id="cancelModal">Cancelar</button>
                    <button class="btn-confirm" id="confirmModal">Iniciar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        let previewStream = null;
        
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                previewStream = stream;
                const video = document.getElementById('previewCam');
                if (video) video.srcObject = stream;
            })
            .catch(err => {
                console.error(err);
                showToast('Erro ao acessar câmera', true);
            });
        
        document.getElementById('cancelModal').onclick = () => {
            if (previewStream) previewStream.getTracks().forEach(t => t.stop());
            modal.remove();
        };
        
        document.getElementById('confirmModal').onclick = async () => {
            const titulo = document.getElementById('liveTitle').value.trim();
            if (!titulo) {
                showToast('Digite o título', true);
                return;
            }
            if (previewStream) previewStream.getTracks().forEach(t => t.stop());
            modal.remove();
            await startLive(titulo);
        };
    }
    
    // ==================== INICIALIZAÇÃO ====================
    document.getElementById('startLiveBtn')?.addEventListener('click', showCreateLiveModal);
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        currentUser = user;
        
        const empresa = await db.ref(`empresas/${user.uid}`).once('value');
        if (empresa.exists()) {
            currentUserType = 'empresa';
            currentUserData = empresa.val();
        } else {
            const cliente = await db.ref(`clientes/${user.uid}`).once('value');
            currentUserType = 'cliente';
            currentUserData = cliente.val() || { nome: user.displayName || 'Cliente' };
        }
        
        const startBtn = document.getElementById('startLiveBtn');
        if (startBtn) {
            startBtn.style.display = currentUserType === 'empresa' ? 'flex' : 'none';
        }
        
        loadActiveLives();
    });
</script>
</body>
</html>
