<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FocoJá Live - Transmissões ao Vivo</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff0055;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
        }

        .logo span {
            color: #ff0055;
        }

        .btn-start {
            background: #ff0055;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        /* Feed */
        .feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .live-card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #333;
        }

        .live-card:hover {
            transform: scale(1.02);
            border-color: #ff0055;
        }

        .live-preview {
            position: relative;
            height: 200px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .live-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff0055;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-viewers {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .live-info {
            padding: 12px;
        }

        .live-info h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .live-info p {
            font-size: 11px;
            color: #ff0055;
        }

        /* Modal iniciar live */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #ff0055;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: #ff0055;
        }

        .modal-content input, 
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }

        .camera-preview {
            background: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            aspect-ratio: 16/9;
        }

        .camera-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-cancel {
            background: #333;
            color: #999;
        }

        .btn-confirm {
            background: #ff0055;
            color: white;
        }

        /* TELA DA LIVE - SIMPLES E FUNCIONAL */
        .live-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .live-video-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .live-video-area img, 
        .live-video-area video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .live-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 16px;
        }

        .live-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-info-small {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }

        .live-info-small span {
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .close-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }

        .chat-sidebar {
            position: absolute;
            right: 0;
            top: 60px;
            bottom: 0;
            width: 280px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ff0055;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-msg {
            font-size: 12px;
            word-break: break-word;
        }

        .chat-msg .name {
            color: #ff0055;
            font-weight: 700;
            margin-right: 8px;
        }

        .chat-msg .text {
            color: #ddd;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid #333;
        }

        .chat-input-area input {
            flex: 1;
            background: #2a2a2a;
            border: none;
            padding: 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .chat-input-area button {
            background: #ff0055;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .action-buttons-live {
            position: absolute;
            right: 300px;
            bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .action-btn-live {
            background: rgba(0,0,0,0.7);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }

        .action-btn-live:active {
            transform: scale(0.9);
        }

        .like-btn-live {
            background: #ff0055;
        }

        .empty-feed {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .floating-heart {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 1001;
            animation: floatAnim 1s ease-out forwards;
        }

        @keyframes floatAnim {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(1) translateY(-100px); opacity: 0; }
        }

        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
                top: auto;
                bottom: 70px;
                height: 250px;
                border-left: none;
                border-top: 1px solid #ff0055;
            }
            .action-buttons-live {
                right: 20px;
                bottom: 280px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Foco<span>Já</span> LIVE</div>
    <button id="startBtn" class="btn-start"><i class="fas fa-video"></i> Iniciar Live</button>
</div>

<div id="feed" class="feed"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACIj5d-Nf01jF4AbzPfXOLNzQpyRXy4Qo",
        authDomain: "afrimov-c6484.firebaseapp.com",
        databaseURL: "https://afrimov-c6484-default-rtdb.firebaseio.com",
        projectId: "afrimov-c6484",
        storageBucket: "afrimov-c6484.firebasestorage.app",
        messagingSenderId: "614232050013",
        appId: "1:614232050013:web:ad3fdf1dbe8187a329c0b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentUserType = null;
    let currentUserNome = null;
    
    // Variáveis da transmissão
    let streamInterval = null;
    let currentStream = null;
    let currentLiveId = null;
    let currentVideoElement = null;

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: ${isError ? '#ff0055' : '#00cc66'};
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            white-space: nowrap;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ==================== PARTE 1: TRANSMISSOR ====================
    async function startBroadcast(title, description) {
        try {
            showToast("Acessando câmera...");
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false // Sem áudio pra simplificar
            });
            
            currentStream = stream;
            
            // Criar live no Firebase
            const liveRef = db.ref('lives').push();
            currentLiveId = liveRef.key;
            
            const liveData = {
                id: currentLiveId,
                empresaId: currentUser.uid,
                empresaNome: currentUserNome,
                titulo: title,
                descricao: description || '',
                inicio: Date.now(),
                ativa: true,
                viewers: {},
                likes: 0,
                currentFrame: null,
                lastFrameTime: 0
            };
            
            await liveRef.set(liveData);
            
            // Adicionar streamer como viewer
            await db.ref(`lives/${currentLiveId}/viewers/${currentUser.uid}`).set({
                nome: currentUserNome,
                entrada: Date.now(),
                isStreamer: true
            });
            
            // Criar elemento de vídeo para capturar frames
            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.playsInline = true;
            await video.play();
            
            // Capturar frames a cada 500ms (2 frames por segundo)
            streamInterval = setInterval(async () => {
                if (!currentLiveId) return;
                
                // Capturar frame do vídeo
                const canvas = document.createElement('canvas');
                canvas.width = 320;
                canvas.height = 240;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const frameData = canvas.toDataURL('image/jpeg', 0.5);
                
                // Salvar frame no Firebase
                await db.ref(`liveFrames/${currentLiveId}`).set({
                    frame: frameData,
                    timestamp: Date.now()
                });
                
            }, 500); // 2 frames por segundo é suficiente e não sobrecarrega
            
            showToast("Live iniciada! 🎥");
            openLiveViewer(currentLiveId, title, true);
            
        } catch (err) {
            console.error(err);
            showToast("Erro ao acessar câmera", true);
        }
    }
    
    async function endBroadcast() {
        if (streamInterval) {
            clearInterval(streamInterval);
            streamInterval = null;
        }
        
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = null;
        }
        
        if (currentLiveId) {
            await db.ref(`lives/${currentLiveId}`).update({ 
                ativa: false,
                fim: Date.now()
            });
            
            // Limpar frames
            await db.ref(`liveFrames/${currentLiveId}`).remove();
            
            showToast("Live encerrada");
            currentLiveId = null;
            loadLives();
        }
    }
    
    // ==================== PARTE 2: ESPECTADOR ====================
    function watchLive(liveId, titulo) {
        openLiveViewer(liveId, titulo, false);
    }
    
    function openLiveViewer(liveId, titulo, isStreamer) {
        // Fechar live anterior
        const oldScreen = document.querySelector('.live-screen');
        if (oldScreen) oldScreen.remove();
        
        const screen = document.createElement('div');
        screen.className = 'live-screen';
        screen.innerHTML = `
            <div class="live-top-bar">
                <div class="live-info-small">
                    <span><i class="fas fa-circle" style="color:#ff0055; font-size:10px;"></i> AO VIVO</span>
                    <span><i class="fas fa-heart" style="color:#ff0055;"></i> <span id="likesCount">0</span></span>
                    <span><i class="fas fa-eye"></i> <span id="viewersCount">0</span></span>
                </div>
                <button class="close-btn" id="closeLiveBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="live-video-area">
                <img id="liveFrame" src="" alt="Live">
                ${isStreamer ? `
                    <div class="action-buttons-live">
                        <button class="action-btn-live" id="switchCamBtn"><i class="fas fa-sync-alt"></i></button>
                        <button class="action-btn-live" id="endLiveBtn" style="background:#ff0055;"><i class="fas fa-power-off"></i></button>
                    </div>
                ` : ''}
            </div>
            <div class="live-overlay">
                <div style="font-weight:700; margin-bottom:4px;">${escapeHtml(titulo)}</div>
                <div style="font-size:11px; color:#ff0055;">${escapeHtml(currentUserNome)}</div>
            </div>
            <div class="chat-sidebar">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Digite uma mensagem...">
                    <button id="sendChatBtn">Enviar</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(screen);
        
        // Adicionar botão de like flutuante
        const likeBtn = document.createElement('button');
        likeBtn.className = 'action-btn-live like-btn-live';
        likeBtn.innerHTML = '<i class="fas fa-heart"></i>';
        likeBtn.style.position = 'absolute';
        likeBtn.style.right = '20px';
        likeBtn.style.bottom = '100px';
        likeBtn.style.zIndex = '15';
        screen.querySelector('.live-video-area').appendChild(likeBtn);
        
        // Carregar frames da live
        const frameRef = db.ref(`liveFrames/${liveId}`);
        let lastFrameTime = 0;
        
        frameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.frame && data.timestamp > lastFrameTime) {
                const img = document.getElementById('liveFrame');
                if (img) {
                    img.src = data.frame;
                    lastFrameTime = data.timestamp;
                }
            }
        });
        
        // Carregar likes
        const likesRef = db.ref(`lives/${liveId}/likes`);
        likesRef.on('value', (snap) => {
            const likes = snap.val() || 0;
            const span = document.getElementById('likesCount');
            if (span) span.innerText = formatNumber(likes);
        });
        
        // Carregar viewers
        const viewersRef = db.ref(`lives/${liveId}/viewers`);
        viewersRef.on('value', (snap) => {
            const count = snap.numChildren();
            const span = document.getElementById('viewersCount');
            if (span) span.innerText = formatNumber(count);
        });
        
        // Carregar chat
        const chatRef = db.ref(`lives/${liveId}/chat`);
        chatRef.on('value', (snap) => {
            const msgs = [];
            snap.forEach(child => msgs.push({ id: child.key, ...child.val() }));
            msgs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
            
            const container = document.getElementById('chatMessages');
            if (container) {
                container.innerHTML = msgs.slice(-50).map(msg => `
                    <div class="chat-msg">
                        <span class="name">${escapeHtml(msg.nome)}${msg.isStreamer ? ' 🎥' : ''}</span>
                        <span class="text">${escapeHtml(msg.texto)}</span>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            }
        });
        
        // Like
        likeBtn.onclick = () => {
            likesRef.transaction(current => (current || 0) + 1);
            
            // Animação
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 80 + 10 + '%';
            heart.style.bottom = '150px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        };
        
        // Enviar mensagem
        document.getElementById('sendChatBtn').onclick = async () => {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            await chatRef.push({
                userId: currentUser.uid,
                nome: currentUserNome,
                texto: msg,
                timestamp: Date.now(),
                isStreamer: currentUser.uid === (await db.ref(`lives/${liveId}/empresaId`).once('value')).val()
            });
            input.value = '';
        };
        
        document.getElementById('chatInput').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('sendChatBtn').click();
        };
        
        // Fechar
        document.getElementById('closeLiveBtn').onclick = async () => {
            if (!isStreamer) {
                await db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).remove();
            }
            if (isStreamer) {
                await endBroadcast();
            }
            screen.remove();
        };
        
        // Streamer controls
        if (isStreamer) {
            let facingMode = 'user';
            
            document.getElementById('switchCamBtn').onclick = async () => {
                facingMode = facingMode === 'user' ? 'environment' : 'user';
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } },
                        audio: false
                    });
                    
                    // Trocar stream
                    const oldTracks = currentStream.getTracks();
                    oldTracks.forEach(t => t.stop());
                    
                    currentStream = newStream;
                    const video = document.createElement('video');
                    video.srcObject = newStream;
                    await video.play();
                    
                    // Reiniciar captura de frames
                    if (streamInterval) clearInterval(streamInterval);
                    
                    streamInterval = setInterval(async () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 320;
                        canvas.height = 240;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const frameData = canvas.toDataURL('image/jpeg', 0.5);
                        await db.ref(`liveFrames/${currentLiveId}`).set({
                            frame: frameData,
                            timestamp: Date.now()
                        });
                    }, 500);
                    
                    showToast("Câmera trocada");
                } catch (err) {
                    showToast("Erro ao trocar câmera", true);
                }
            };
            
            document.getElementById('endLiveBtn').onclick = async () => {
                if (confirm("Encerrar live?")) {
                    await endBroadcast();
                    screen.remove();
                }
            };
        }
        
        // Adicionar viewer se não for streamer
        if (!isStreamer) {
            db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).set({
                nome: currentUserNome,
                entrada: Date.now()
            });
            
            // Remover ao fechar
            screen.addEventListener('beforeunload', () => {
                db.ref(`lives/${liveId}/viewers/${currentUser.uid}`).remove();
            });
        }
    }
    
    // ==================== PARTE 3: FEED DE LIVES ====================
    function loadLives() {
        db.ref('lives').orderByChild('ativa').equalTo(true).on('value', (snapshot) => {
            const lives = [];
            snapshot.forEach(child => {
                lives.push({ id: child.key, ...child.val() });
            });
            renderFeed(lives);
        });
    }
    
    function renderFeed(lives) {
        const container = document.getElementById('feed');
        if (!container) return;
        
        if (lives.length === 0) {
            container.innerHTML = `
                <div class="empty-feed">
                    <i class="fas fa-video fa-3x" style="color:#ff0055;"></i>
                    <h3 style="margin-top: 16px;">Nenhuma live no momento</h3>
                    <p style="font-size: 13px; color:#666;">Volte mais tarde ou inicie uma transmissão</p>
                    ${currentUserType === 'empresa' ? '<button id="emptyStartBtn" style="margin-top: 16px; background:#ff0055; border:none; padding:10px 24px; border-radius:30px; color:white; font-weight:600; cursor:pointer;"><i class="fas fa-play"></i> Iniciar Live</button>' : ''}
                </div>
            `;
            if (currentUserType === 'empresa') {
                document.getElementById('emptyStartBtn')?.addEventListener('click', showStartModal);
            }
            return;
        }
        
        container.innerHTML = lives.map(live => {
            const viewers = live.viewers ? Object.keys(live.viewers).length : 0;
            return `
                <div class="live-card" data-id="${live.id}">
                    <div class="live-preview">
                        <div style="font-size: 40px; color:#ff0055;"><i class="fas fa-video"></i></div>
                        <div class="live-badge"><i class="fas fa-circle"></i> AO VIVO</div>
                        <div class="live-viewers"><i class="fas fa-eye"></i> ${formatNumber(viewers)}</div>
                    </div>
                    <div class="live-info">
                        <h4>${escapeHtml(live.titulo)}</h4>
                        <p><i class="fas fa-store"></i> ${escapeHtml(live.empresaNome)}</p>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.live-card').forEach(card => {
            const liveId = card.dataset.id;
            const live = lives.find(l => l.id === liveId);
            card.addEventListener('click', () => {
                watchLive(liveId, live.titulo);
            });
        });
    }
    
    function formatNumber(num) {
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== MODAL INICIAR LIVE ====================
    function showStartModal() {
        if (currentUserType !== 'empresa') {
            showToast('Apenas empresas podem iniciar lives', true);
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-video"></i> Iniciar Live</h3>
                <div class="camera-preview">
                    <video id="previewCam" autoplay muted playsinline></video>
                </div>
                <input type="text" id="liveTitle" placeholder="Título da live">
                <textarea id="liveDesc" placeholder="Descrição (opcional)" rows="2"></textarea>
                <div class="modal-buttons">
                    <button class="btn-cancel" id="cancelModal">Cancelar</button>
                    <button class="btn-confirm" id="confirmModal">Iniciar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        let previewStream = null;
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
            .then(stream => {
                previewStream = stream;
                const video = document.getElementById('previewCam');
                if (video) video.srcObject = stream;
            })
            .catch(err => {
                console.error(err);
                showToast("Erro ao acessar câmera", true);
            });
        
        document.getElementById('cancelModal').onclick = () => {
            if (previewStream) previewStream.getTracks().forEach(t => t.stop());
            modal.remove();
        };
        
        document.getElementById('confirmModal').onclick = async () => {
            const title = document.getElementById('liveTitle').value.trim();
            if (!title) {
                showToast('Digite um título', true);
                return;
            }
            const desc = document.getElementById('liveDesc').value.trim();
            if (previewStream) previewStream.getTracks().forEach(t => t.stop());
            modal.remove();
            await startBroadcast(title, desc);
        };
    }
    
    // ==================== INICIALIZAÇÃO ====================
    document.getElementById('startBtn').addEventListener('click', showStartModal);
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        currentUser = user;
        
        // Descobrir tipo de usuário
        const empresaSnap = await db.ref(`empresas/${user.uid}`).once('value');
        if (empresaSnap.exists()) {
            currentUserType = 'empresa';
            currentUserNome = empresaSnap.val().nomeEmpresa || user.displayName || 'Empresa';
        } else {
            const clienteSnap = await db.ref(`clientes/${user.uid}`).once('value');
            currentUserType = 'cliente';
            currentUserNome = clienteSnap.val()?.nome || user.displayName || 'Cliente';
        }
        
        // Mostrar/esconder botão de iniciar live
        const startBtn = document.getElementById('startBtn');
        if (startBtn) {
            startBtn.style.display = currentUserType === 'empresa' ? 'flex' : 'none';
        }
        
        loadLives();
    });
</script>
